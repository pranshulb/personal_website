<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>writings — pranshul's cafe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a2a1c;
      --ink-soft: #4e6452;
      --paper: #f2eed8;
      --paper-edge: #e4e0c4;
      --accent: #3e7a4a;
      --accent-soft: #79ab82;
    }

    body {
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100vh;
      color: var(--ink);
      line-height: 1.9;
      background: #28382a;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.08) 0%, transparent 40%);
      padding: 3rem 1rem;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: none;
    }

    .sheet {
      position: relative;
      max-width: 640px;
      width: 100%;
      background: var(--paper);
      padding: 4rem 3.5rem 3.5rem;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.10),
        0 10px 30px rgba(0,0,0,0.18),
        inset 0 0 80px rgba(180,160,130,0.12);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(120,100,80,0.05) 31px, rgba(120,100,80,0.05) 32px);
      border-radius: 2px;
    }

    .sheet::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--paper-edge), var(--paper), var(--paper-edge));
      opacity: 0.6;
    }

    .stamp {
      font-family: 'Special Elite', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      border: 1.5px solid var(--accent-soft);
      display: inline-block;
      padding: 0.25rem 0.7rem;
      transform: rotate(-3deg);
      opacity: 0.8;
      margin-bottom: 2.5rem;
      min-width: 7.5rem;
      min-height: 1.5rem;
    }

    h1 {
      font-family: 'Special Elite', monospace;
      font-size: 2.1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
      line-height: 1.25;
      min-height: 2.65rem;
    }

    .typed-line {
      font-family: 'Special Elite', monospace;
      color: var(--ink-soft);
      font-size: 1rem;
      min-height: 1.9rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
    }

    .cursor {
      display: inline-block;
      width: 0.6ch;
      background: var(--accent);
      color: var(--accent);
      animation: blink 1s steps(1) infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    p { color: var(--ink-soft); margin-bottom: 1.2rem; font-size: 0.98rem; min-height: 1.86rem; }
    p.lead { color: var(--ink); }

    .divider {
      border: none;
      border-top: 1px dashed rgba(120,100,80,0.4);
      margin: 2.2rem 0;
      transition: opacity 0.4s ease;
    }

    h2 {
      font-family: 'Special Elite', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      min-height: 1.3rem;
    }

    ul { list-style: none; transition: opacity 0.4s ease; }
    li { margin: 0.5rem 0; font-size: 0.98rem; }
    li::before { content: '— '; color: var(--accent-soft); }

    a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-soft);
      transition: all 0.2s ease;
    }
    a:hover { color: var(--accent); border-bottom-color: var(--accent); background: rgba(62,122,74,0.06); }

    .footer {
      margin-top: 3rem;
      padding-top: 1.4rem;
      border-top: 1px solid rgba(120,100,80,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      transition: opacity 0.5s ease;
    }
    .footer .meta {
      font-family: 'Special Elite', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #a89a86;
    }

    @media (max-width: 600px) {
      body { padding: 1rem 0.4rem; }
      .sheet { padding: 2rem 1.2rem 1.8rem; overflow-wrap: break-word; word-break: break-word; }
      h1 { font-size: 1.5rem; min-height: 2rem; }
      h2 { min-height: auto; }
      p { min-height: auto; font-size: 0.93rem; }
      .typed-line { font-size: 0.9rem; }
      .stamp { font-size: 0.62rem; transform: rotate(-2deg); }
      li { font-size: 0.93rem; }
    }
  </style>
  <script defer src="https://analytics.pranshul.cafe/script.js" data-website-id="fd5100ed-c3c1-4ee0-a84c-9cdf3feaaf1f"></script>
</head>
<body>

  <div class="sheet">
    <!-- All content pre-populated so layout is reserved; JS types it in progressively -->
    <span class="stamp" id="el-stamp" style="visibility:hidden">MANUSCRIPT · DRAFTS</span>

    <h1 id="el-h1" style="visibility:hidden">writings</h1>
    <div class="typed-line" id="typed" style="visibility:hidden"><span class="cursor">&nbsp;</span></div>

    <hr class="divider" id="el-div1" style="visibility:hidden">

    <h2 id="el-h2a" style="visibility:hidden">filed</h2>
    <ul id="el-ul1" style="visibility:hidden">
      <li><a href="/writings/passion">passion</a></li>
      <li><a href="/writings/feeling-empty">feeling empty</a></li>
      <li><a href="/writings/important-and-sadness">what's really important and about sadness</a></li>
    </ul>

    <div class="footer" id="el-footer" style="visibility:hidden; opacity:0">
      <a href="/typewriter">← back</a>
      <span class="meta">EST. EDINBURGH · CORRESPONDENCE</span>
    </div>
  </div>

  <script>
    // ── adjacent keyboard keys for realistic typos ──────────
    function adjacentKey(ch) {
      const map = {
        a:'sqwz', b:'vghn', c:'xdfv', d:'serfcx', e:'wsdr', f:'drtgvc', g:'ftyhbv',
        h:'gyujbn', i:'ujko', j:'huikmn', k:'jiolm', l:'kop', m:'njk', n:'bhjm',
        o:'iklp', p:'ol', q:'wa',  r:'edft', s:'aqwedxz', t:'rfgy', u:'yhji',
        v:'cfgb', w:'qase', x:'zsdc', y:'tghu', z:'xs'
      };
      const c = ch.toLowerCase();
      const opts = map[c] || 'etaoin';
      return opts[Math.floor(Math.random() * opts.length)];
    }

    // ── type text with occasional typos + backspaces ─────────
    function typeWithMistakes(el, text, done, speed, mistakeRate) {
      const s = speed || 13;
      const rate = mistakeRate !== undefined ? mistakeRate : 0.015;
      el.innerHTML = '';
      el.style.visibility = 'visible';

      let output = '';
      let pos = 0;

      function render(withCursor) {
        el.innerHTML = output + (withCursor ? '<span class="cursor">&nbsp;</span>' : '');
      }

      function step() {
        if (pos >= text.length) {
          render(false);
          if (done) setTimeout(done, 230);
          return;
        }

        const ch = text[pos];
        const doMistake = pos > 3 && /[a-zA-Z]/.test(ch) && Math.random() < rate;

        if (doMistake) {
          // type wrong char
          output += adjacentKey(ch);
          render(true);
          setTimeout(() => {
            // realise mistake — pause, then backspace
            output = output.slice(0, -1);
            render(true);
            setTimeout(() => {
              // type correct char and carry on
              output += ch;
              pos++;
              render(pos < text.length);
              if (pos >= text.length) { render(false); if (done) setTimeout(done, 230); }
              else setTimeout(step, s + Math.random() * s * 0.9);
            }, 95 + Math.random() * 85);
          }, 210 + Math.random() * 170);
        } else {
          output += ch;
          pos++;
          if (pos >= text.length) {
            render(false);
            if (done) setTimeout(done, 230);
          } else {
            render(true);
            setTimeout(step, s + Math.random() * s * 0.9);
          }
        }
      }

      step();
    }

    // convenience: read existing DOM text, then type it with mistakes
    function typeEl(el, done, speed) {
      const text = el.textContent.trim();
      el.innerHTML = '';
      typeWithMistakes(el, text, done, speed);
    }

    // type explicit string with mistakes
    function typeText(el, text, done, speed, rate) {
      el.innerHTML = '';
      typeWithMistakes(el, text, done, speed, rate);
    }

    // ── fade reveal (visibility:hidden → visible) ─────────────
    function reveal(el, done) {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.4s ease';
      el.style.visibility = 'visible';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.opacity = '1';
      }));
      if (done) setTimeout(done, 500);
    }

    // ── tagline — types once, then leaves cursor blinking ────
    const taglineEl = document.getElementById('typed');
    const taglineText = 'thinking out loud and taking you through this journey with me.';
    const cursor = '<span class="cursor">&nbsp;</span>';

    function typeTagline(done) {
      let i = 0;
      function step() {
        taglineEl.innerHTML = taglineText.slice(0, i) + cursor;
        i++;
        if (i <= taglineText.length) setTimeout(step, 14 + Math.random() * 17);
        else if (done) setTimeout(done, 400);
      }
      step();
    }

    // ── sequence ──────────────────────────────────────────────
    function run() {
      const stamp  = document.getElementById('el-stamp');
      const h1     = document.getElementById('el-h1');
      const typed  = document.getElementById('typed');
      const div1   = document.getElementById('el-div1');
      const h2a    = document.getElementById('el-h2a');
      const ul1    = document.getElementById('el-ul1');
      const footer = document.getElementById('el-footer');

      // stamp
      stamp.innerHTML = '';
      typeText(stamp, 'MANUSCRIPT · DRAFTS', () => {

        // h1
        typeEl(h1, () => {

          // tagline — types once and leaves cursor
          typed.style.visibility = 'visible';
          typeTagline(() => {

            // divider
            reveal(div1, () => {

              // "filed"
              typeText(h2a, 'filed', () => {

                // writing links
                reveal(ul1, () => {

                  // footer
                  reveal(footer, null);

                });
              });
            });
          });
        });
      }, 35);
    }

    setTimeout(run, 350);
  </script>

</body>
</html>
