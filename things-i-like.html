<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>things i like — pranshul's cafe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      color: #3a2f2f;
      line-height: 1.8;
      background: #faf5ef;
      overflow-x: hidden;
    }

    a { color: #3a2f2f; text-decoration-color: #d4a0a0; text-underline-offset: 3px; }
    a:hover { color: #c47a7a; text-decoration-color: #c47a7a; }
    .back {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 0.9rem;
      color: #b09a8a;
      text-decoration: none;
      z-index: 10;
    }
    .back:hover { color: #3a2f2f; }

    h1 {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem;
      font-weight: 400;
      color: #c4a0a0;
      z-index: 10;
      letter-spacing: 0.02em;
    }

    .scatter {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 5rem 2rem 3rem;
    }

    .thing {
      position: absolute;
      font-size: 1.15rem;
      color: #5a4a40;
      white-space: nowrap;
      transition: color 0.3s ease, transform 0.3s ease;
      cursor: default;
    }

    .thing:hover {
      color: #c47a7a;
      transform: scale(1.05);
    }

    .socials {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .socials a {
      color: #c4b0a0;
      font-size: 0.85rem;
      text-decoration: none;
      border-bottom: none;
    }

    .socials a:hover {
      color: #c47a7a;
    }

    /* falling cherry blossom petals */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateX(0) rotate(0deg) scale(0.8); }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateX(var(--drift)) rotate(var(--spin)) scale(0.4); }
    }

    .epigraph {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: #c4a0a0;
      letter-spacing: 0.03em;
      margin: 0;
      z-index: 10;
    }

    @media (max-width: 640px) {
      .epigraph { display: none; }
      h1 { font-size: 1.2rem; }
      .thing { font-size: 1.05rem; }
      .socials { gap: 1rem; }
      .socials a { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<p class="epigraph"><em>cherry blossoms fall at 5 centimeters per second.</em></p>
<a href="/" class="back">← back</a>
<h1>things i like</h1>

<div class="scatter" id="scatter"></div>

<div class="socials">
  <a href="mailto:pranshulbohra@gmail.com">email</a>
  <a href="https://pranshulbohra.substack.com/">substack</a>
  <a href="http://goodreads.com/pranshulb">goodreads</a>
  <a href="https://curius.app/pranshul-bohra">curius</a>
  <a href="https://www.instagram.com/pranshul.bohra/">instagram</a>
</div>

<script>
  const things = [
    "apricity", "The Humans", "The Name of the Wind", "Eragon",
    "Manchester by the Sea", "Catch Me If You Can", "Exurb1a", "green"
  ];

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const container = document.getElementById('scatter');
  const shuffled = shuffle([...things]);
  const placed = [];

  // place each word at a random position, avoiding overlaps
  shuffled.forEach((text, i) => {
    const el = document.createElement('span');
    el.className = 'thing';
    el.textContent = text;
    // vary opacity slightly for depth
    el.style.opacity = 0.55 + Math.random() * 0.45;
    // vary size slightly
    const scale = 0.9 + Math.random() * 0.4;
    el.style.fontSize = (1.15 * scale) + 'rem';
    // slight random rotation
    el.style.transform = `rotate(${-3 + Math.random() * 6}deg)`;

    container.appendChild(el);

    // position after appending so we can measure
    const rect = el.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    const padX = 40;
    const padY = 30;
    const maxX = container.clientWidth - w - padX;
    const topMin = 80;
    const maxY = Math.max(container.clientHeight - 120, 400);

    let x, y, tries = 0, ok = false;
    while (tries < 80) {
      x = padX + Math.random() * maxX;
      y = topMin + Math.random() * (maxY - topMin);
      ok = true;
      for (const p of placed) {
        if (Math.abs(x - p.x) < (w + p.w) * 0.55 && Math.abs(y - p.y) < (h + p.h) * 0.7) {
          ok = false;
          break;
        }
      }
      if (ok) break;
      tries++;
    }

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    placed.push({ x, y, w, h });
  });

  // cherry blossoms
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const startX = Math.random() * window.innerWidth;
    const size = 8 + Math.random() * 12;
    const duration = 8 + Math.random() * 12;
    const drift = -60 + Math.random() * 120;
    const spin = 180 + Math.random() * 540;
    const delay = Math.random() * 5;
    const colors = ['#f0b0b0', '#e8a0a0', '#f2c0c0', '#dba0a0', '#eab0b0'];
    const color = colors[Math.floor(Math.random() * colors.length)];

    petal.style.cssText = `
      left: ${startX}px; top: -20px; width: ${size}px; height: ${size * 0.7}px;
      background: radial-gradient(ellipse at center, ${color} 0%, transparent 70%);
      border-radius: 50% 0 50% 0;
      animation-duration: ${duration}s; animation-delay: ${delay}s;
      --drift: ${drift}px; --spin: ${spin}deg;
    `;
    petal.animate([{ top: '-20px' }, { top: `${window.innerHeight + 20}px` }], {
      duration: duration * 1000, delay: delay * 1000, fill: 'forwards'
    });
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), (duration + delay) * 1000);
  }
  setInterval(createPetal, 1500);
  for (let i = 0; i < 8; i++) setTimeout(createPetal, i * 600);
</script>

</body>
</html>
