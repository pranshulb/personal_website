<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>things i like — pranshul's cafe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      color: #3a2f2f;
      line-height: 1.8;
      background: #faf5ef;
    }

    .container {
      max-width: 520px;
      margin: 0 0 0 2rem;
      padding: 5rem 1.5rem 3rem;
    }

    a { color: #3a2f2f; text-decoration-color: #d4a0a0; text-underline-offset: 3px; }
    a:hover { color: #c47a7a; text-decoration-color: #c47a7a; }
    .back { font-size: 0.9rem; color: #b09a8a; margin-bottom: 2rem; display: inline-block; text-decoration: none; }
    .back:hover { color: #3a2f2f; }

    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .flow {
      font-size: 1.1rem;
      color: #5a4a40;
      line-height: 2;
    }

    .flow .sep {
      color: #d4a0a0;
      margin: 0 0.15rem;
    }

    .socials {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .social-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .social-links a {
      color: #b09a8a;
      border-bottom: none;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .social-links a:hover {
      color: #c47a7a;
    }

    /* falling cherry blossom petals */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateX(0) rotate(0deg) scale(0.8); }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateX(var(--drift)) rotate(var(--spin)) scale(0.4); }
    }

    .epigraph {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: #c4a0a0;
      letter-spacing: 0.03em;
      margin: 0;
      z-index: 10;
    }

    @media (max-width: 640px) {
      .epigraph {
        position: relative;
        top: auto;
        right: auto;
        text-align: center;
        padding: 1rem 1.25rem 0;
        font-size: 0.8rem;
      }
      .container {
        margin: 0 auto;
        padding: 3rem 1.25rem 2.5rem;
      }
      h1 { font-size: 1.5rem; }
      .flow { font-size: 1rem; }
    }
  </style>
</head>
<body>

<p class="epigraph"><em>cherry blossoms fall at 5 centimeters per second.</em></p>

<div class="container">
  <a href="/" class="back">← back</a>

  <h1>things i like</h1>

  <p class="flow" id="likes"></p>

  <script>
    const things = [
      "apricity", "The Humans", "The Name of the Wind", "Eragon",
      "Manchester by the Sea", "Catch Me If You Can", "Exurb1a", "green"
    ];
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    const el = document.getElementById('likes');
    el.innerHTML = shuffle([...things]).join(' <span class="sep">·</span> ');
  </script>

  <div class="socials">
    <div class="social-links">
      <a href="mailto:pranshulbohra@gmail.com">email</a>
      <a href="https://pranshulbohra.substack.com/">substack</a>
      <a href="http://goodreads.com/pranshulb">goodreads</a>
      <a href="https://curius.app/pranshul-bohra">curius</a>
      <a href="https://www.instagram.com/pranshul.bohra/">instagram</a>
    </div>
    <p style="margin-top: 2rem; font-size: 1.05rem; color: #c47a7a; font-style: italic;">please please text me if you think it'd be fun to chat!!</p>
  </div>

</div>

<script>
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const startX = Math.random() * window.innerWidth;
    const size = 8 + Math.random() * 12;
    const duration = 8 + Math.random() * 12;
    const drift = -60 + Math.random() * 120;
    const spin = 180 + Math.random() * 540;
    const delay = Math.random() * 5;
    const colors = ['#f0b0b0', '#e8a0a0', '#f2c0c0', '#dba0a0', '#eab0b0'];
    const color = colors[Math.floor(Math.random() * colors.length)];

    petal.style.cssText = `
      left: ${startX}px; top: -20px; width: ${size}px; height: ${size * 0.7}px;
      background: radial-gradient(ellipse at center, ${color} 0%, transparent 70%);
      border-radius: 50% 0 50% 0;
      animation-duration: ${duration}s; animation-delay: ${delay}s;
      --drift: ${drift}px; --spin: ${spin}deg;
    `;
    petal.animate([{ top: '-20px' }, { top: `${window.innerHeight + 20}px` }], {
      duration: duration * 1000, delay: delay * 1000, fill: 'forwards'
    });
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), (duration + delay) * 1000);
  }
  setInterval(createPetal, 1500);
  for (let i = 0; i < 8; i++) setTimeout(createPetal, i * 600);
</script>

</body>
</html>
