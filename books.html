  function renderBooks() {
    const grid = document.getElementById('bookGrid');
    const sortBy = document.getElementById('sortBy').value;
    const desc = document.getElementById('orderDesc').checked;
    let sorted = [...books];

    if (sortBy === 'rating') sorted.sort((a, b) => desc ? b.rating - a.rating : a.rating - b.rating);
    else if (sortBy === 'title') sorted.sort((a, b) => { const r = a.title.localeCompare(b.title); return desc ? -r : r; });
    else if (sortBy === 'author') sorted.sort((a, b) => { const r = a.author.localeCompare(b.author); return desc ? -r : r; });

    document.getElementById('book-count').textContent = sorted.length;

    grid.innerHTML = sorted.map(b => {
      const cleanTitle = b.title.split('(')[0].trim();
      const shortTitle = cleanTitle.length > 30 ? cleanTitle.substring(0, 27) + '...' : cleanTitle;
      return `
        <div class="book-card">
          <div class="book-cover">
            ${b.cover
              ? `<img src="${b.cover}" alt="${cleanTitle}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-cover>📖<div class=mini-title>${shortTitle}</div></div>'">`
              : `<div class="no-cover">📖<div class="mini-title">${shortTitle}</div></div>`
            }
          </div>
          <div class="book-title">${cleanTitle}</div>
          <div class="book-author">${b.author}</div>
          ${b.rating ? `<div class="book-rating">${'★'.repeat(b.rating)}${'☆'.repeat(5 - b.rating)}</div>` : ''}
          ${b.note ? `<div class="book-note">"${b.note}"</div>` : ''}
        </div>
      `;
    }).join('');
  }

  document.getElementById('sortBy').addEventListener('change', renderBooks);
  document.querySelectorAll('input[name="order"]').forEach(r => r.addEventListener('change', renderBooks));

  renderBooks();

  // petals
  function createPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    const x = Math.random() * window.innerWidth, s = 8 + Math.random() * 12;
    const d = 8 + Math.random() * 12, dr = -60 + Math.random() * 120, sp = 180 + Math.random() * 540;
    const dl = Math.random() * 5;
    const c = ['#f0b0b0','#e8a0a0','#f2c0c0','#dba0a0'][Math.floor(Math.random()*4)];
    p.style.cssText = `left:${x}px;top:-20px;width:${s}px;height:${s*0.7}px;background:radial-gradient(ellipse at center,${c} 0%,transparent 70%);border-radius:50% 0 50% 0;animation-duration:${d}s;animation-delay:${dl}s;--drift:${dr}px;--spin:${sp}deg;`;
    p.animate([{top:'-20px'},{top:`${window.innerHeight+20}px`}],{duration:d*1000,delay:dl*1000,fill:'forwards'});
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(d+dl)*1000);
  }
  setInterval(createPetal, 2500);
  for(let i=0;i<4;i++) setTimeout(createPetal,i*1000);
</script>
