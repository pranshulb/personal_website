<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pranshul's cafe!</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 520px;
      margin: 3rem auto;
      padding: 1.5rem;
      color: #2a2a2a;
      line-height: 1.7;
      background: #fefefe;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
    h3 { font-size: 1rem; color: #888; font-weight: 400; margin-top: 0; font-style: italic; }
    a { color: #2a2a2a; text-decoration-color: #ccc; text-underline-offset: 3px; }
    a:hover { text-decoration-color: #2a2a2a; }
    ul { list-style: none; padding: 0; }
    li { margin: 0.4rem 0; }
    li::before { content: '→ '; color: #bbb; }
    .socials { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; font-size: 0.9rem; color: #666; }
    .socials a { color: #666; }
    .socials a:hover { color: #2a2a2a; }
    .social-links { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .copy-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      background: #2a2a2a;
      color: #fefefe;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: Georgia, serif;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .copy-hint {
      font-size: 0.85rem;
      color: #bbb;
      margin-top: 1rem;
    }
    .copy-hint kbd {
      display: inline-block;
      padding: 0.1em 0.35em;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: Georgia, serif;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>

<h1>pranshul's cafe</h1>
<h3>(still cooking)</h3>

<p>pastries ready:</p>
<ul>
  <li><a href="/examined">examined.</a> — made a philosophy personality test for funsies:)</li>
</ul>

<div class="socials">
  <div class="social-links">
    <a href="https://www.instagram.com/pranshul.bohra/">instagram</a>
    <a href="https://pranshulbohra.substack.com/">substack</a>
    <a href="https://www.linkedin.com/in/pranshul-b-00051b213/">linkedin</a>
    <a href="https://curius.app/pranshul-bohra">curius</a>
    <a href="mailto:pranshulbohra@gmail.com">email</a>
  </div>
  <p class="copy-hint">press <kbd>C</kbd> to copy my email!</p>
</div>

<div class="copy-toast" id="copyToast">email copied!</div>

<script>
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'c' || e.key === 'C') && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) && !e.metaKey && !e.ctrlKey) {
      navigator.clipboard.writeText('pranshulbohra@gmail.com').then(() => {
        const toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
  });
</script>

</body>
</html>
