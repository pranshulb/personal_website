<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>writings — pranshul's cafe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      color: #3a2f2f;
      line-height: 1.8;
      background: #faf5ef;
    }

    .container {
      max-width: 520px;
      margin: 0 0 0 2rem;
      padding: 5rem 1.5rem 3rem;
    }

    a { color: #3a2f2f; text-decoration-color: #ccc; text-underline-offset: 3px; }
    a:hover { text-decoration-color: #3a2f2f; }
    .back { font-size: 0.9rem; color: #b09a8a; margin-bottom: 2rem; display: inline-block; }
    .back:hover { color: #3a2f2f; }

    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #b09a8a;
      font-style: italic;
      margin-bottom: 2.5rem;
    }

    .writing-item {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e8ddd4;
    }

    .writing-item:last-child {
      border-bottom: none;
    }

    .writing-title {
      font-size: 1.15rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .writing-title a {
      text-decoration: none;
    }

    .writing-title a:hover {
      text-decoration: underline;
      text-decoration-color: #c4a0a0;
    }

    .writing-date {
      font-size: 0.85rem;
      color: #b09a8a;
      margin-bottom: 0.5rem;
    }

    .writing-desc {
      font-size: 0.95rem;
      color: #6b5c5c;
    }

    .writing-tag {
      display: inline-block;
      font-size: 0.75rem;
      color: #c4a0a0;
      border: 1px solid #e8ddd4;
      padding: 0.1rem 0.5rem;
      border-radius: 3px;
      margin-right: 0.3rem;
      margin-top: 0.4rem;
    }

    /* falling cherry blossom petals */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateX(0) rotate(0deg) scale(0.8); }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateX(var(--drift)) rotate(var(--spin)) scale(0.4); }
    }

    .epigraph {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: #c4a0a0;
      letter-spacing: 0.03em;
      margin: 0;
      z-index: 10;
    }

    @media (max-width: 640px) {
      .epigraph {
        position: relative;
        top: auto;
        right: auto;
        text-align: center;
        padding: 1rem 1.25rem 0;
        font-size: 0.8rem;
      }
      .container {
        margin: 0 auto;
        padding: 3rem 1.25rem 2.5rem;
      }
    }
  </style>
</head>
<body>

<p class="epigraph">cherry blossoms fall at 5 centimeters per second.</p>

<div class="container">
  <a href="/" class="back">← back</a>

  <h1>writings</h1>
  <p class="subtitle">I am thinking out loud and taking you through this journey with me, inspired by <a href="https://nicklaustran.substack.com/p/whats-in-my-notes">Nick</a>.</p>

  <!-- WRITINGS GO HERE — add new items at the top -->

  <div class="writing-item">
    <div class="writing-title"><a href="/writings/passion">passion</a></div>
  </div>

  <p style="color: #b09a8a; font-style: italic; margin-top: 2rem;">more coming soon...</p>

</div>

<script>
  // Cherry blossom petals
  function createPetal() {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.innerHTML = '🌸';
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.top = '-20px';
    petal.style.fontSize = (Math.random() * 10 + 8) + 'px';
    const duration = Math.random() * 6 + 6;
    petal.style.animationDuration = duration + 's';
    petal.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
    petal.style.setProperty('--spin', (Math.random() * 360) + 'deg');
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), duration * 1000);
  }
  setInterval(createPetal, 2000);
  for (let i = 0; i < 3; i++) setTimeout(createPetal, i * 700);
</script>

</body>
</html>
